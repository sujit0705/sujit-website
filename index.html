
<html>
<head>
<title>Sujit Mini Gaming</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.header{
background:#0f172a;
padding:15px;
font-size:24px;
}

.menu button{
padding:10px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:8px;
}

.game{
margin-top:20px;
}

.red{background:red;color:white;}
.green{background:green;color:white;}

</style>
</head>

<body>

<div class="header">
🎮 Sujit Mini Gaming
</div>

<div class="menu">

<button onclick="show('color')">Color Game</button>
<button onclick="show('guess')">Number Guess</button>
<button onclick="show('click')">Click Speed</button>
<button onclick="show('dice')">Dice Game</button>
<button onclick="show('snake')">Snake Game</button>
</div>

<div class="game" id="gameArea">

<p>Select a game</p>

</div>

<script>

function show(game){

if(game=="color"){

document.getElementById("gameArea").innerHTML=

`<h2>Color Prediction</h2>
<button class="red" onclick="color('red')">Red</button>
<button class="green" onclick="color('green')">Green</button>
<h3 id="colorResult"></h3>`;

}

if(game=="guess"){

document.getElementById("gameArea").innerHTML=

`<h2>Number Guess (1-5)</h2>
<input id="guess">
<button onclick="guess()">Check</button>
<h3 id="guessResult"></h3>`;

}

if(game=="click"){

let count=0;

document.getElementById("gameArea").innerHTML=

`<h2>Click Speed</h2>
<button onclick="clickGame()">Click Me</button>
<h3 id="clickResult"></h3>`;

window.clickCount=0;

}

if(game=="dice"){

let n=Math.floor(Math.random()*6)+1;

document.getElementById("gameArea").innerHTML=

`<h2>Dice Roll</h2>
<h1>`+n+`</h1>
<button onclick="show('dice')">Roll Again</button>`;

}

}

function color(choice){

let r=Math.random()<0.5?"red":"green";

document.getElementById("colorResult").innerHTML=
(choice==r)?"🎉 You Win":"😢 You Lose";

}

function guess(){

let n=Math.floor(Math.random()*5)+1;

let g=document.getElementById("guess").value;

document.getElementById("guessResult").innerHTML=
(g==n)?"Correct 🎉":"Wrong 😢 Number was "+n;

}

function clickGame(){

clickCount++;

document.getElementById("clickResult").innerHTML=
"Clicks : "+clickCount;

}

</script>

</body>
</html>
