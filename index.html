<!DOCTYPE html>
<html>
<head>
<title>Sujit Gaming</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

.header{
background:#1e293b;
padding:15px;
font-size:22px;
}

.wallet{
margin:15px;
padding:10px;
background:#334155;
border-radius:10px;
}

button{
padding:12px 20px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
}

.red{background:red;color:white;}
.green{background:green;color:white;}

#timer{
font-size:28px;
margin:20px;
}
</style>

</head>

<body>

<div class="header">
Sujit Gaming
</div>

<div class="wallet">
Wallet Balance: ₹100
<br><br>
<button>Login</button>
</div>

<h2 id="timer">10</h2>

<p>Choose Color</p>

<button class="red" onclick="choose('red')">Red</button>
<button class="green" onclick="choose('green')">Green</button>

<h2 id="result"></h2>

<script>

let time=10;
let choice="";

function choose(color){
choice=color;
}

setInterval(function(){

time--;
document.getElementById("timer").innerHTML=time;

if(time==0){

let result=Math.random()<0.5?"red":"green";

if(choice==result){
document.getElementById("result").innerHTML="You Win 🎉";
}else{
document.getElementById("result").innerHTML="You Lose 😢";
}

time=10;
choice="";
}

},1000);

</script>

</body>
</html>
