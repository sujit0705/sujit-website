<!DOCTYPE html>
<html>
<head>
<title>Sujit Color Prediction</title>

<style>
body{
background:#111;
color:white;
text-align:center;
font-family:Arial;
}

button{
padding:15px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
}

.red{background:red;color:white;}
.green{background:green;color:white;}

#timer{
font-size:30px;
margin:20px;
}
</style>

</head>

<body>

<h1>Sujit Color Prediction</h1>

<h2 id="timer">10</h2>

<p>Choose Color</p>

<button class="red" onclick="choose('red')">Red</button>
<button class="green" onclick="choose('green')">Green</button>

<h2 id="result"></h2>

<script>

let time=10;
let choice="";

function choose(color){
choice=color;
}

setInterval(function(){

time--;
document.getElementById("timer").innerHTML=time;

if(time==0){

let result=Math.random()<0.5?"red":"green";

if(choice==result){
document.getElementById("result").innerHTML="You Win 🎉";
}else{
document.getElementById("result").innerHTML="You Lose 😢";
}

time=10;
choice="";
}

},1000);

</script>

</body>
</html>
