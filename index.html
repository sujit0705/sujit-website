<!DOCTYPE html>
<html>
<head>
<title>Sujit Gaming</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#000;
color:white;
}

button{
padding:10px 20px;
font-size:20px;
}
</style>
</head>

<body>

<h1>Sujit Gaming Website</h1>
<p>Click to start game</p>

<button onclick="play()">Play Game</button>

<h2 id="result"></h2>

<script>
function play(){

let r=Math.random();

if(r<0.5){
document.getElementById("result").innerHTML="Player 1 Wins";
}
else{
document.getElementById("result").innerHTML="Player 2 Wins";
}

}
</script>

</body>
</html>
