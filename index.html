<!DOCTYPE html>
<html>
<head>
<title>Sujit Gaming</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.header{
background:#0f172a;
padding:15px;
font-size:22px;
font-weight:bold;
}

.wallet{
background:#1e293b;
margin:15px;
padding:15px;
border-radius:12px;
}

.gamebox{
background:#0f172a;
margin:20px;
padding:20px;
border-radius:15px;
}

button{
padding:12px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

.red{
background:#ef4444;
color:white;
}

.green{
background:#22c55e;
color:white;
}

.bet{
background:#2563eb;
color:white;
}

#timer{
font-size:35px;
margin:20px;
font-weight:bold;
}

#result{
margin-top:20px;
font-size:22px;
}

</style>
</head>

<body>

<div class="header">
🎮 Sujit Gaming
</div>

<div class="wallet">
Wallet Balance : ₹100  
<br><br>
<button class="bet">Add Money</button>
<button class="bet">Withdraw</button>
</div>

<div class="gamebox">

<h2 id="timer">10</h2>
<h3>Select Bet</h3>

<button class="bet">₹1</button>
<button class="bet">₹5</button>
<button class="bet">₹10</button>
<button class="bet">₹50</button>
<button class="bet">₹100</button>

<br>
<p>Choose Color</p>

<button class="red" onclick="choose('red')">Red</button>
<button class="green" onclick="choose('green')">Green</button>

<h3 id="result"></h3>

</div>

<script>

let time=10;
let choice="";

function choose(color){
choice=color;
}

setInterval(function(){

time--;
document.getElementById("timer").innerHTML=time;

if(time==0){

let result=Math.random()<0.5?"red":"green";

if(choice==result){
document.getElementById("result").innerHTML="🎉 You Win";
}else{
document.getElementById("result").innerHTML="😢 You Lose";
}

time=10;
choice="";

}

},1000);

</script>

</body>
</html>
